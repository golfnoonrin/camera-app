<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 ถ่ายภาพ 16:9 และบันทึกลงคอม</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        video, canvas {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            height: auto;
        }
        video {
            width: 640px;
            background: #000;
        }
        .preview {
            margin-top: 20px;
        }
        canvas {
            display: none;
        }
        img {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            max-height: 300px;
        }
        .button-group {
            margin: 20px 0;
        }
        button {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 12px 25px;
            margin: 0 10px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .download-btn {
            background-color: #27ae60;
        }
        .download-btn:hover {
            background-color: #2ecc71;
        }
        .toggle-btn {
            background-color: #9b59b6;
        }
        .toggle-btn:hover {
            background-color: #8e44ad;
        }
        .file-size {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>📷 ถ่ายภาพสัดส่วน 16:9 และบันทึกลงคอม</h1>
    <video id="video" autoplay playsinline></video>
    
    <div class="button-group">
        <button id="captureBtn" disabled>📸 ถ่ายภาพ (16:9)</button>
        <button id="toggleCameraBtn" class="toggle-btn">🔛 เปิดกล้อง</button>
    </div>

    <div class="preview">
        <h3>ภาพตัวอย่าง</h3>
        <img id="photoPreview" src="#" alt="ภาพที่ถ่ายจะแสดงที่นี่">
        <div id="fileSizeDisplay" class="file-size"></div>
    </div>
    <button id="downloadBtn" class="download-btn" disabled>💾 บันทึกภาพ</button>

    <canvas id="canvas"></canvas>

    <script>
        (function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const captureBtn = document.getElementById('captureBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const photoPreview = document.getElementById('photoPreview');
            const fileSizeDisplay = document.getElementById('fileSizeDisplay');
            const toggleCameraBtn = document.getElementById('toggleCameraBtn');

            let capturedImageBlob = null;
            let cameraStream = null;
            let isCameraOn = false;
            let isCameraLoading = false;

            // --- ตั้งค่าเมื่อ metadata โหลดเสร็จ (กล้องพร้อม) ---
            video.onloadedmetadata = () => {
                if (isCameraOn) {
                    captureBtn.disabled = false;
                }
            };

            // --- เปิดกล้อง ---
            async function startCamera() {
                if (isCameraLoading) return;
                if (cameraStream) return;

                isCameraLoading = true;
                toggleCameraBtn.disabled = true;
                captureBtn.disabled = true;

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: false 
                    });
                    
                    cameraStream = stream;
                    video.srcObject = stream;
                    isCameraOn = true;
                    toggleCameraBtn.textContent = '🔛 ปิดกล้อง';
                    
                } catch (err) {
                    alert('ไม่สามารถเข้าถึงกล้องได้: ' + err.message);
                    console.error(err);
                    isCameraOn = false;
                    captureBtn.disabled = true;
                    toggleCameraBtn.textContent = '🔛 เปิดกล้อง';
                } finally {
                    isCameraLoading = false;
                    toggleCameraBtn.disabled = false;
                }
            }

            // --- ปิดกล้อง ---
            function stopCamera() {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                    cameraStream = null;
                    video.srcObject = null;
                }
                isCameraOn = false;
                captureBtn.disabled = true;
                toggleCameraBtn.textContent = '🔛 เปิดกล้อง';
            }

            // --- สลับสถานะกล้อง ---
            function toggleCamera() {
                if (isCameraLoading) return;
                if (isCameraOn) {
                    stopCamera();
                } else {
                    startCamera();
                }
            }

            // --- คำนวณพื้นที่ครอบตัดให้ได้สัดส่วน 16:9 จากวิดีโอ ---
            function getCropRegion(videoWidth, videoHeight) {
                const targetAspect = 16 / 9;
                let srcW, srcH, srcX, srcY;

                if (videoWidth / videoHeight > targetAspect) {
                    // วิดีโอกว้างเกินไป → ต้องตัดซ้าย-ขวา
                    srcH = videoHeight;
                    srcW = srcH * targetAspect;
                    srcX = (videoWidth - srcW) / 2;
                    srcY = 0;
                } else {
                    // วิดีโอสูงเกินไป หรือเท่ากันพอดี → ต้องตัดบน-ล่าง
                    srcW = videoWidth;
                    srcH = srcW / targetAspect;
                    srcX = 0;
                    srcY = (videoHeight - srcH) / 2;
                }

                return { srcX, srcY, srcW, srcH };
            }

            // --- ฟังก์ชันหลักสำหรับถ่ายภาพและบีบอัดให้ ≤ 300KB (รักษาสัดส่วน 16:9) ---
            function capturePhotoWithSizeLimit(maxSizeKB = 300) {
                // รับขนาดจริงจากวิดีโอ
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                if (vW === 0 || vH === 0) {
                    alert('กล้องยังไม่พร้อม');
                    return;
                }

                // คำนวณพื้นที่ครอบตัด 16:9
                const { srcX, srcY, srcW, srcH } = getCropRegion(vW, vH);

                // กำหนดขนาด output สูงสุด (คงอัตราส่วน 16:9)
                const MAX_WIDTH = 1280;
                let outW = Math.min(srcW, MAX_WIDTH);
                let outH = outW * 9 / 16;   // รักษา 16:9

                // คุณภาพเริ่มต้น
                let quality = 0.8;

                // ฟังก์ชันลองถ่ายด้วยขนาดและคุณภาพที่กำหนด (ขนาด output = outW * scale, outH * scale)
                const tryCapture = (scale, q) => {
                    const currW = Math.round(outW * scale);
                    const currH = Math.round(outH * scale);
                    canvas.width = currW;
                    canvas.height = currH;

                    // วาดภาพโดยครอบตัดให้ได้ 16:9 และปรับขนาดให้พอดี canvas
                    ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, currW, currH);

                    // อัปเดตตัวอย่าง (ใช้คุณภาพเต็ม 1.0 เพื่อความคม แต่ไม่เกี่ยวกับไฟล์)
                    const dataURL = canvas.toDataURL('image/jpeg', 1.0);
                    photoPreview.src = dataURL;

                    // คืนค่า blob ตามคุณภาพที่กำหนด
                    return new Promise((resolve) => {
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', q);
                    });
                };

                // เริ่มลองที่ scale = 1, quality = 0.8
                tryCapture(1.0, quality).then((blob) => {
                    let sizeKB = blob.size / 1024;
                    console.log(`ขนาดไฟล์ครั้งแรก: ${sizeKB.toFixed(2)} KB`);

                    if (sizeKB <= maxSizeKB) {
                        // ผ่านเกณฑ์
                        capturedImageBlob = blob;
                        downloadBtn.disabled = false;
                        fileSizeDisplay.textContent = `ขนาดไฟล์: ${sizeKB.toFixed(2)} KB (16:9)`;
                        // อัปเดตรูปตัวอย่างให้ตรงกับ blob (คุณภาพอาจลดลง)
                        const url = URL.createObjectURL(blob);
                        photoPreview.src = url;
                        URL.revokeObjectURL(url);
                    } else {
                        // เริ่มลดคุณภาพและ/หรือขนาด
                        const reduceQualityOrScale = async (currentScale, currentQuality) => {
                            // ถ้าคุณภาพยังลดได้ (> 0.2) ให้ลดคุณภาพก่อน
                            if (currentQuality > 0.2) {
                                const newQuality = currentQuality - 0.1;
                                const newBlob = await tryCapture(currentScale, newQuality);
                                if (newBlob.size / 1024 <= maxSizeKB) {
                                    return { blob: newBlob, scale: currentScale, quality: newQuality };
                                } else {
                                    // ยังเกิน ให้ลดต่อไป
                                    return reduceQualityOrScale(currentScale, newQuality);
                                }
                            } else {
                                // คุณภาพเหลือ 0.2 แล้วยังเกิน → ลดขนาดลงครึ่งหนึ่ง (scale ลดลง) แล้วเริ่ม quality ใหม่ที่ 0.8
                                const newScale = currentScale * 0.7; // ลดลง 30% (ไม่ให้เล็กเกินไป)
                                if (newScale < 0.3) {
                                    // ถ้าเล็กมากแล้ว ให้ยอมตามที่มี
                                    const finalBlob = await tryCapture(currentScale, currentQuality);
                                    return { blob: finalBlob, scale: currentScale, quality: currentQuality };
                                } else {
                                    // เริ่มคุณภาพใหม่ที่ 0.8
                                    const newBlob = await tryCapture(newScale, 0.8);
                                    if (newBlob.size / 1024 <= maxSizeKB) {
                                        return { blob: newBlob, scale: newScale, quality: 0.8 };
                                    } else {
                                        // ยังเกิน ให้ลดคุณภาพอีก
                                        return reduceQualityOrScale(newScale, 0.8);
                                    }
                                }
                            }
                        };

                        reduceQualityOrScale(1.0, quality).then((result) => {
                            capturedImageBlob = result.blob;
                            downloadBtn.disabled = false;
                            const finalSizeKB = result.blob.size / 1024;
                            fileSizeDisplay.textContent = `ขนาดไฟล์: ${finalSizeKB.toFixed(2)} KB (16:9, ปรับให้อยู่ในเกณฑ์)`;

                            const url = URL.createObjectURL(result.blob);
                            photoPreview.src = url;
                            URL.revokeObjectURL(url);
                        });
                    }
                });
            }

            // --- ดาวน์โหลดภาพ ---
            function downloadPhoto() {
                if (!capturedImageBlob) return;
                const url = URL.createObjectURL(capturedImageBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'ภาพถ่าย_16-9_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            // --- ผูก Events ---
            captureBtn.addEventListener('click', () => {
                if (isCameraOn && video.videoWidth > 0) {
                    capturePhotoWithSizeLimit(300);
                } else {
                    alert('กรุณาเปิดกล้องก่อนถ่ายภาพ');
                }
            });

            downloadBtn.addEventListener('click', downloadPhoto);
            toggleCameraBtn.addEventListener('click', toggleCamera);

            // --- เริ่มต้นเปิดกล้องอัตโนมัติ ---
            startCamera();
        })();
    </script>
</body>
</html>
