<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 ถ่ายภาพ 16:9 และบันทึกลงคอม</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        video, canvas {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            height: auto;
        }
        video {
            width: 640px;
            background: #000;
        }
        .preview {
            margin-top: 20px;
        }
        canvas {
            display: none;
        }
        img {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            max-height: 300px;
        }
        .button-group {
            margin: 20px 0;
        }
        button {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 12px 25px;
            margin: 0 10px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .download-btn {
            background-color: #27ae60;
        }
        .download-btn:hover {
            background-color: #2ecc71;
        }
        .toggle-btn {
            background-color: #9b59b6;
        }
        .toggle-btn:hover {
            background-color: #8e44ad;
        }
        .file-size {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }
        .loading {
            display: inline-block;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>📷 ถ่ายภาพสัดส่วน 16:9 และบันทึกลงคอม</h1>
    <video id="video" autoplay playsinline></video>
    
    <div class="button-group">
        <button id="captureBtn" disabled>📸 ถ่ายภาพ (16:9)</button>
        <button id="toggleCameraBtn" class="toggle-btn">🔛 เปิดกล้อง</button>
    </div>

    <div class="preview">
        <h3>ภาพตัวอย่าง</h3>
        <img id="photoPreview" src="#" alt="ภาพที่ถ่ายจะแสดงที่นี่">
        <div id="fileSizeDisplay" class="file-size"></div>
    </div>
    <button id="downloadBtn" class="download-btn" disabled>💾 บันทึกภาพ</button>

    <canvas id="canvas"></canvas>

    <script>
        (function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const captureBtn = document.getElementById('captureBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const photoPreview = document.getElementById('photoPreview');
            const fileSizeDisplay = document.getElementById('fileSizeDisplay');
            const toggleCameraBtn = document.getElementById('toggleCameraBtn');

            let capturedImageBlob = null;
            let cameraStream = null;
            let isCameraOn = false;
            let isCameraLoading = false;
            let currentPreviewUrl = null; // เก็บ URL ของรูปตัวอย่างปัจจุบัน

            // --- ตั้งค่าเมื่อ metadata โหลดเสร็จ ---
            video.onloadedmetadata = () => {
                if (isCameraOn) {
                    captureBtn.disabled = false;
                }
            };

            // --- เปิดกล้อง ---
            async function startCamera() {
                if (isCameraLoading) return;
                if (cameraStream) return;

                isCameraLoading = true;
                toggleCameraBtn.disabled = true;
                captureBtn.disabled = true;

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: false 
                    });
                    
                    cameraStream = stream;
                    video.srcObject = stream;
                    isCameraOn = true;
                    toggleCameraBtn.textContent = '🔛 ปิดกล้อง';
                    
                } catch (err) {
                    alert('ไม่สามารถเข้าถึงกล้องได้: ' + err.message);
                    console.error(err);
                    isCameraOn = false;
                    captureBtn.disabled = true;
                    toggleCameraBtn.textContent = '🔛 เปิดกล้อง';
                } finally {
                    isCameraLoading = false;
                    toggleCameraBtn.disabled = false;
                }
            }

            // --- ปิดกล้อง ---
            function stopCamera() {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                    cameraStream = null;
                    video.srcObject = null;
                }
                isCameraOn = false;
                captureBtn.disabled = true;
                toggleCameraBtn.textContent = '🔛 เปิดกล้อง';
            }

            // --- สลับสถานะกล้อง ---
            function toggleCamera() {
                if (isCameraLoading) return;
                if (isCameraOn) {
                    stopCamera();
                } else {
                    startCamera();
                }
            }

            // --- คำนวณพื้นที่ครอบตัด 16:9 ---
            function getCropRegion(videoWidth, videoHeight) {
                const targetAspect = 16 / 9;
                let srcW, srcH, srcX, srcY;

                if (videoWidth / videoHeight > targetAspect) {
                    // วิดีโอกว้างเกิน → ตัดซ้าย-ขวา
                    srcH = videoHeight;
                    srcW = srcH * targetAspect;
                    srcX = (videoWidth - srcW) / 2;
                    srcY = 0;
                } else {
                    // วิดีโอสูงเกินหรือเท่ากัน → ตัดบน-ล่าง
                    srcW = videoWidth;
                    srcH = srcW / targetAspect;
                    srcX = 0;
                    srcY = (videoHeight - srcH) / 2;
                }
                // ปัดเศษเพื่อให้วาดภาพได้คมชัด
                return {
                    srcX: Math.round(srcX),
                    srcY: Math.round(srcY),
                    srcW: Math.round(srcW),
                    srcH: Math.round(srcH)
                };
            }

            // --- ฟังก์ชันสร้าง blob จาก canvas ด้วยคุณภาพที่กำหนด ---
            function getBlobFromCanvas(quality) {
                return new Promise((resolve) => {
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/jpeg', quality);
                });
            }

            // --- ฟังก์ชันถ่ายภาพและบีบอัดไม่เกิน 300KB (16:9) ---
            async function capturePhotoWithSizeLimit(maxSizeKB = 300) {
                // ตรวจสอบความพร้อมของวิดีโอ
                if (!isCameraOn || video.videoWidth === 0 || video.videoHeight === 0) {
                    alert('กล้องยังไม่พร้อม กรุณาลองอีกครั้ง');
                    return;
                }

                // แสดงสถานะกำลังถ่ายภาพ
                captureBtn.disabled = true;
                captureBtn.textContent = '📸 กำลังถ่าย...';

                try {
                    const vW = video.videoWidth;
                    const vH = video.videoHeight;

                    // คำนวณพื้นที่ครอบตัด 16:9
                    const { srcX, srcY, srcW, srcH } = getCropRegion(vW, vH);

                    // กำหนดขนาด output สูงสุด (คงอัตราส่วน 16:9)
                    const MAX_WIDTH = 1280;
                    let outW = Math.min(srcW, MAX_WIDTH);
                    let outH = Math.round(outW * 9 / 16);

                    // ตั้งค่า canvas ตามขนาด output
                    canvas.width = outW;
                    canvas.height = outH;

                    // วาดภาพที่ครอบตัดและปรับขนาดลง canvas
                    ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, outW, outH);

                    // --- เริ่มกระบวนการบีบอัด ---
                    let quality = 0.9;        // เริ่มที่คุณภาพ 90%
                    let step = 0.1;            // ลดลงครั้งละ 10%
                    let minQuality = 0.2;       // คุณภาพต่ำสุดที่ยอมรับ
                    let currentBlob = await getBlobFromCanvas(quality);
                    let currentSizeKB = currentBlob.size / 1024;

                    // ถ้าไฟล์ใหญ่เกินไป ให้ลดคุณภาพลงเรื่อย ๆ
                    while (currentSizeKB > maxSizeKB && quality > minQuality) {
                        quality = Math.max(quality - step, minQuality);  // ลดคุณภาพ แต่ไม่ต่ำกว่า minQuality
                        currentBlob = await getBlobFromCanvas(quality);
                        currentSizeKB = currentBlob.size / 1024;
                    }

                    // ถ้ายังใหญ่เกินและคุณภาพต่ำสุดแล้ว ให้ลดขนาดภาพลงอีก
                    if (currentSizeKB > maxSizeKB) {
                        // ลดขนาดลง 20% แล้วลองใหม่ (คง 16:9)
                        let scale = 0.8;
                        while (currentSizeKB > maxSizeKB && outW * scale > 320) { // ไม่ให้เล็กเกินไป
                            const newW = Math.round(outW * scale);
                            const newH = Math.round(newW * 9 / 16);
                            canvas.width = newW;
                            canvas.height = newH;
                            ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, newW, newH);

                            // เริ่มคุณภาพใหม่ที่ 0.8
                            quality = 0.8;
                            currentBlob = await getBlobFromCanvas(quality);
                            currentSizeKB = currentBlob.size / 1024;

                            // ถ้ายังเกิน ให้ลดคุณภาพลงอีก
                            while (currentSizeKB > maxSizeKB && quality > minQuality) {
                                quality = Math.max(quality - step, minQuality);
                                currentBlob = await getBlobFromCanvas(quality);
                                currentSizeKB = currentBlob.size / 1024;
                            }

                            scale *= 0.8; // ลดขนาดลงอีกในรอบถัดไปถ้ายังเกิน
                        }
                    }

                    // --- บันทึก blob และอัปเดตตัวอย่าง ---
                    capturedImageBlob = currentBlob;
                    downloadBtn.disabled = false;
                    fileSizeDisplay.textContent = `ขนาดไฟล์: ${currentSizeKB.toFixed(2)} KB (16:9)`;

                    // แก้ไข: ลบ URL เดิมก่อนถ้ามี
                    if (currentPreviewUrl) {
                        URL.revokeObjectURL(currentPreviewUrl);
                    }
                    
                    // สร้าง URL ใหม่และแสดงภาพ
                    currentPreviewUrl = URL.createObjectURL(currentBlob);
                    photoPreview.src = currentPreviewUrl;
                    
                } catch (err) {
                    console.error('ถ่ายภาพล้มเหลว:', err);
                    alert('เกิดข้อผิดพลาดในการถ่ายภาพ');
                } finally {
                    // คืนสถานะปุ่ม
                    captureBtn.disabled = false;
                    captureBtn.textContent = '📸 ถ่ายภาพ (16:9)';
                }
            }

            // --- ดาวน์โหลดภาพ ---
            function downloadPhoto() {
                if (!capturedImageBlob) return;
                const url = URL.createObjectURL(capturedImageBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'ภาพถ่าย_16-9_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            // --- ผูก Events ---
            captureBtn.addEventListener('click', () => {
                capturePhotoWithSizeLimit(300).catch(err => {
                    console.error('ถ่ายภาพล้มเหลว:', err);
                    alert('เกิดข้อผิดพลาดในการถ่ายภาพ');
                });
            });

            downloadBtn.addEventListener('click', downloadPhoto);
            toggleCameraBtn.addEventListener('click', toggleCamera);

            // --- เริ่มต้นเปิดกล้องอัตโนมัติ ---
            startCamera();
        })();
    </script>
</body>
</html>
