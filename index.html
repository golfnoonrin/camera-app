<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 ถ่ายภาพและบันทึกลงคอม (ไฟล์ไม่เกิน 300KB)</title>
    <style>
        /* คงเดิม */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        video, canvas {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            height: auto;
        }
        video {
            width: 640px;
            background: #000;
        }
        .preview {
            margin-top: 20px;
        }
        canvas {
            display: none;
        }
        img {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            max-height: 300px;
        }
        .button-group {
            margin: 20px 0;
        }
        button {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 12px 25px;
            margin: 0 10px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .download-btn {
            background-color: #27ae60;
        }
        .download-btn:hover {
            background-color: #2ecc71;
        }
        .file-size {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>📷 ถ่ายภาพและบันทึกลงคอมพิวเตอร์ (ไฟล์ไม่เกิน 300KB)</h1>
    <video id="video" autoplay playsinline></video>
    
    <div class="button-group">
        <button id="captureBtn" disabled>📸 ถ่ายภาพ</button>
        <button id="downloadBtn" class="download-btn" disabled>💾 บันทึกภาพ</button>
    </div>

    <div class="preview">
        <h3>ภาพตัวอย่าง</h3>
        <img id="photoPreview" src="#" alt="ภาพที่ถ่ายจะแสดงที่นี่">
        <div id="fileSizeDisplay" class="file-size"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const photoPreview = document.getElementById('photoPreview');
        const fileSizeDisplay = document.getElementById('fileSizeDisplay');

        let capturedImageBlob = null;

        // เริ่มต้นกล้อง
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: false 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    captureBtn.disabled = false;
                };
            } catch (err) {
                alert('ไม่สามารถเข้าถึงกล้องได้: ' + err.message);
                console.error(err);
            }
        }

        // ฟังก์ชันสำหรับปรับขนาดและบีบอัดภาพให้ไฟล์ <= 300KB
        function capturePhotoWithSizeLimit(maxSizeKB = 300) {
            // กำหนดความละเอียดเริ่มต้น (อาจปรับลดลงถ้าจำเป็น)
            let targetWidth = video.videoWidth;
            let targetHeight = video.videoHeight;
            const maxWidth = 1280; // จำกัดความกว้างสูงสุด 1280px (ปรับได้)
            
            // ถ้าเดิมกว้างเกิน maxWidth ให้ย่อขนาดลงตามสัดส่วน
            if (targetWidth > maxWidth) {
                targetHeight = Math.round((targetHeight * maxWidth) / targetWidth);
                targetWidth = maxWidth;
            }
            
            // กำหนดคุณภาพเริ่มต้น
            let quality = 0.8; // 80%
            
            // ฟังก์ชันสำหรับลองสร้าง blob ด้วยขนาดและคุณภาพที่กำหนด
            const tryCapture = (width, height, q) => {
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(video, 0, 0, width, height);
                
                // แสดงตัวอย่าง (ใช้ dataURL คุณภาพสูงเพื่อความคม แต่ไม่เกี่ยวกับไฟล์)
                const dataURL = canvas.toDataURL('image/jpeg', q);
                photoPreview.src = dataURL;
                
                // สร้าง blob และวัดขนาด
                return new Promise((resolve) => {
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/jpeg', q);
                });
            };
            
            // ลองครั้งแรกด้วยขนาดและคุณภาพที่ตั้งไว้
            tryCapture(targetWidth, targetHeight, quality).then((blob) => {
                let sizeKB = blob.size / 1024;
                console.log(`ขนาดไฟล์ครั้งแรก: ${sizeKB.toFixed(2)} KB`);
                
                // ถ้าเกิน ให้ลดคุณภาพลงเรื่อย ๆ
                if (sizeKB > maxSizeKB) {
                    // ปรับคุณภาพลดลงทีละ 0.1 จนกว่า <= maxSizeKB หรือ quality ต่ำกว่า 0.2
                    const reduceQuality = (q) => {
                        if (q < 0.2) {
                            // ถ้าคุณภาพต่ำมากแล้วยังไม่พอ ให้ลดขนาดความละเอียดอีก
                            if (targetWidth > 800) {
                                targetWidth = 800;
                                targetHeight = Math.round((targetHeight * 800) / targetWidth);
                                return tryCapture(targetWidth, targetHeight, 0.7); // เริ่มใหม่ที่คุณภาพ 0.7
                            } else {
                                // ยอมตามที่มี
                                return blob;
                            }
                        }
                        return tryCapture(targetWidth, targetHeight, q).then(newBlob => {
                            if (newBlob.size / 1024 <= maxSizeKB) return newBlob;
                            else return reduceQuality(q - 0.1);
                        });
                    };
                    
                    reduceQuality(quality - 0.1).then(finalBlob => {
                        capturedImageBlob = finalBlob;
                        downloadBtn.disabled = false;
                        const finalSizeKB = finalBlob.size / 1024;
                        fileSizeDisplay.textContent = `ขนาดไฟล์: ${finalSizeKB.toFixed(2)} KB (ปรับคุณภาพ/ขนาดให้อยู่ในเกณฑ์)`;
                        
                        // อัปเดตตัวอย่างให้ตรงกับ blob (อาจจะเบลอหน่อย แต่ตรงขนาด)
                        const url = URL.createObjectURL(finalBlob);
                        photoPreview.src = url;
                        URL.revokeObjectURL(url);
                    });
                } else {
                    // ไม่เกินแล้ว
                    capturedImageBlob = blob;
                    downloadBtn.disabled = false;
                    fileSizeDisplay.textContent = `ขนาดไฟล์: ${sizeKB.toFixed(2)} KB`;
                }
            });
        }

        // เมื่อกดปุ่มถ่ายภาพ เรียกใช้ฟังก์ชันด้านบน
        captureBtn.addEventListener('click', () => {
            capturePhotoWithSizeLimit(300);
        });

        // ดาวน์โหลดภาพ
        function downloadPhoto() {
            if (!capturedImageBlob) return;
            const url = URL.createObjectURL(capturedImageBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'ภาพถ่าย_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        downloadBtn.addEventListener('click', downloadPhoto);

        initCamera();
    </script>
</body>
</html>
