<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 ถ่ายภาพและบันทึกลงคอม (เปิด/ปิดกล้องได้)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        video, canvas {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            height: auto;
        }
        video {
            width: 640px;
            background: #000;
        }
        .preview {
            margin-top: 20px;
        }
        canvas {
            display: none;
        }
        img {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 100%;
            max-height: 300px;
        }
        .button-group {
            margin: 20px 0;
        }
        button {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 12px 25px;
            margin: 0 10px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .download-btn {
            background-color: #27ae60;
        }
        .download-btn:hover {
            background-color: #2ecc71;
        }
        .file-size {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
        }
        /* เพิ่มสไตล์สำหรับปุ่ม toggle */
        .toggle-btn {
            background-color: #9b59b6;
        }
        .toggle-btn:hover {
            background-color: #8e44ad;
        }
    </style>
</head>
<body>
    <h1>📷 ถ่ายภาพและบันทึกลงคอม (เปิด/ปิดกล้องได้)</h1>
    <video id="video" autoplay playsinline></video>
    
    <div class="button-group">
        <button id="captureBtn" disabled>📸 ถ่ายภาพ</button>
        <button id="toggleCameraBtn" class="toggle-btn">🔛 เปิดกล้อง</button>
    </div>

    <div class="preview">
        <h3>ภาพตัวอย่าง</h3>
        <img id="photoPreview" src="#" alt="ภาพที่ถ่ายจะแสดงที่นี่">
        <div id="fileSizeDisplay" class="file-size"></div>
    </div>
    <button id="downloadBtn" class="download-btn" disabled>💾 บันทึกภาพ</button>

    <canvas id="canvas"></canvas>

    <script>
        (function() {
            // DOM elements
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const captureBtn = document.getElementById('captureBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const photoPreview = document.getElementById('photoPreview');
            const fileSizeDisplay = document.getElementById('fileSizeDisplay');
            const toggleCameraBtn = document.getElementById('toggleCameraBtn');

            // State variables
            let capturedImageBlob = null;        // เก็บ blob ของภาพล่าสุด
            let cameraStream = null;              // เก็บ stream ของกล้อง
            let isCameraOn = false;                // สถานะกล้องเปิด/ปิด
            let isCameraLoading = false;           // กันการกดซ้ำขณะกำลังเปิดกล้อง

            // --- ตั้งค่า listener สำหรับ loadedmetadata (รอให้กล้าพร้อมใช้งาน) ---
            video.onloadedmetadata = () => {
                // ต่อเมื่อกล้องกำลังเปิดอยู่เท่านั้น ถึงจะ enable ปุ่มถ่ายภาพ
                if (isCameraOn) {
                    captureBtn.disabled = false;
                }
            };

            // --- ฟังก์ชันเปิดกล้อง ---
            async function startCamera() {
                // ป้องกันการเรียกซ้ำขณะกำลังโหลด
                if (isCameraLoading) return;
                // ถ้ามี stream อยู่แล้ว (กล้องเปิดค้าง) ไม่ต้องทำอะไร
                if (cameraStream) return;

                isCameraLoading = true;
                toggleCameraBtn.disabled = true;   // disable ปุ่มระหว่างรอ
                captureBtn.disabled = true;         // ยังไม่ให้ถ่ายภาพ

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: false 
                    });
                    
                    cameraStream = stream;
                    video.srcObject = stream;
                    isCameraOn = true;
                    
                    // เปลี่ยนข้อความปุ่มเป็น "ปิดกล้อง"
                    toggleCameraBtn.textContent = '🔛 ปิดกล้อง';
                    
                    // หมายเหตุ: captureBtn จะถูก enable โดย video.onloadedmetadata เมื่อ metadata โหลดเสร็จ
                    // ถ้า metadata โหลดแล้วแต่ยังไม่ enable (กรณีเปิดกล้องสำเร็จและ metadata มาทันที) 
                    // เราปล่อยให้ onloadedmetadata จัดการ
                    
                } catch (err) {
                    alert('ไม่สามารถเข้าถึงกล้องได้: ' + err.message);
                    console.error(err);
                    
                    isCameraOn = false;
                    captureBtn.disabled = true;
                    toggleCameraBtn.textContent = '🔛 เปิดกล้อง';  // คงข้อความเปิดกล้อง
                } finally {
                    isCameraLoading = false;
                    toggleCameraBtn.disabled = false;   // คืนค่าปุ่มให้กดได้
                }
            }

            // --- ฟังก์ชันปิดกล้อง ---
            function stopCamera() {
                if (cameraStream) {
                    // หยุดทุก track ใน stream
                    cameraStream.getTracks().forEach(track => track.stop());
                    cameraStream = null;
                    video.srcObject = null;
                }
                
                isCameraOn = false;
                captureBtn.disabled = true;                // ปิดกล้องแล้วห้ามถ่ายภาพ
                toggleCameraBtn.textContent = '🔛 เปิดกล้อง'; // เปลี่ยนข้อความเป็นเปิดกล้อง
                
                // ไม่ลบภาพตัวอย่างหรือ blob เก่า (ผู้ใช้ยังคงดาวน์โหลดภาพเดิมได้)
                // แต่ถ้าต้องการให้ลบภาพตัวอย่างเมื่อปิดกล้อง ให้ปลดคอมเมนต์ 2 บรรทัดถัดไป
                // photoPreview.src = '#';
                // capturedImageBlob = null; downloadBtn.disabled = true;
            }

            // --- ฟังก์ชันสลับเปิด/ปิดกล้อง ---
            function toggleCamera() {
                if (isCameraLoading) return; // กำลังเปิดอยู่ ไม่ให้สับสน
                
                if (isCameraOn) {
                    stopCamera();
                } else {
                    startCamera();
                }
            }

            // --- ฟังก์ชันถ่ายภาพและบีบอัดให้ <= 300KB (เหมือนเดิม) ---
            function capturePhotoWithSizeLimit(maxSizeKB = 300) {
                // กำหนดความละเอียดเริ่มต้น
                let targetWidth = video.videoWidth;
                let targetHeight = video.videoHeight;
                const maxWidth = 1280; // จำกัดความกว้างสูงสุด
                
                // ถ้ากว้างเกิน maxWidth ให้ย่อลงตามสัดส่วน
                if (targetWidth > maxWidth) {
                    targetHeight = Math.round((targetHeight * maxWidth) / targetWidth);
                    targetWidth = maxWidth;
                }
                
                let quality = 0.8; // คุณภาพเริ่มต้น 80%
                
                // ฟังก์ชันลอง capture ด้วยขนาดและคุณภาพที่กำหนด
                const tryCapture = (width, height, q) => {
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(video, 0, 0, width, height);
                    
                    // อัปเดตรูปตัวอย่าง (คุณภาพเต็มเพื่อความคม)
                    const dataURL = canvas.toDataURL('image/jpeg', 1.0);
                    photoPreview.src = dataURL;
                    
                    // สร้าง blob ตามคุณภาพที่ต้องการ
                    return new Promise((resolve) => {
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', q);
                    });
                };
                
                // ลองครั้งแรกด้วยขนาดและคุณภาพที่ตั้งไว้
                tryCapture(targetWidth, targetHeight, quality).then((blob) => {
                    let sizeKB = blob.size / 1024;
                    console.log(`ขนาดไฟล์ครั้งแรก: ${sizeKB.toFixed(2)} KB`);
                    
                    if (sizeKB > maxSizeKB) {
                        // ปรับคุณภาพลดลงทีละ 0.1 จนกว่า <= maxSizeKB หรือ quality ต่ำกว่า 0.2
                        const reduceQuality = (q) => {
                            if (q < 0.2) {
                                // ถ้าคุณภาพต่ำมากแล้วยังไม่พอ ให้ลดขนาดความละเอียดอีก
                                if (targetWidth > 800) {
                                    targetWidth = 800;
                                    targetHeight = Math.round((targetHeight * 800) / targetWidth);
                                    return tryCapture(targetWidth, targetHeight, 0.7); // เริ่มใหม่ที่คุณภาพ 0.7
                                } else {
                                    // ยอมตามที่มี
                                    return blob;
                                }
                            }
                            return tryCapture(targetWidth, targetHeight, q).then(newBlob => {
                                if (newBlob.size / 1024 <= maxSizeKB) return newBlob;
                                else return reduceQuality(q - 0.1);
                            });
                        };
                        
                        reduceQuality(quality - 0.1).then(finalBlob => {
                            capturedImageBlob = finalBlob;
                            downloadBtn.disabled = false;
                            const finalSizeKB = finalBlob.size / 1024;
                            fileSizeDisplay.textContent = `ขนาดไฟล์: ${finalSizeKB.toFixed(2)} KB (ปรับคุณภาพ/ขนาดให้อยู่ในเกณฑ์)`;
                            
                            // อัปเดตรูปตัวอย่างให้ตรงกับ blob (อาจเบลอเล็กน้อย)
                            const url = URL.createObjectURL(finalBlob);
                            photoPreview.src = url;
                            URL.revokeObjectURL(url);
                        });
                    } else {
                        // ไม่เกินเกณฑ์
                        capturedImageBlob = blob;
                        downloadBtn.disabled = false;
                        fileSizeDisplay.textContent = `ขนาดไฟล์: ${sizeKB.toFixed(2)} KB`;
                    }
                });
            }

            // --- ฟังก์ชันดาวน์โหลดภาพ (เหมือนเดิม) ---
            function downloadPhoto() {
                if (!capturedImageBlob) return;
                const url = URL.createObjectURL(capturedImageBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'ภาพถ่าย_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            // --- ผูก Events ---
            captureBtn.addEventListener('click', () => {
                if (isCameraOn && video.videoWidth > 0) {
                    capturePhotoWithSizeLimit(300);
                } else {
                    alert('กรุณาเปิดกล้องก่อนถ่ายภาพ');
                }
            });

            downloadBtn.addEventListener('click', downloadPhoto);
            toggleCameraBtn.addEventListener('click', toggleCamera);

            // --- เริ่มต้น: เปิดกล้องอัตโนมัติเมื่อโหลดหน้า ---
            startCamera();
        })();
    </script>
</body>
</html>
